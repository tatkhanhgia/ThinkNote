version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: thinknote-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: thinknote
      POSTGRES_PASSWORD: thinknote_dev
      POSTGRES_DB: thinknote
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
